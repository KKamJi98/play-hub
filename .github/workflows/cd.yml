name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare Image Metadata
    runs-on: ubuntu-latest
    outputs:
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
      frontend_image: ${{ steps.vars.outputs.frontend_image }}
      backend_image: ${{ steps.vars.outputs.backend_image }}
    steps:
      - id: vars
        run: |
          OWNER_LC="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "image_namespace=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${OWNER_LC}/play-hub-frontend" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${OWNER_LC}/play-hub-backend" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build & Push Frontend
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ needs.prepare.outputs.frontend_image }}:${{ github.sha }}
            ${{ needs.prepare.outputs.frontend_image }}:latest

  build-backend:
    name: Build & Push Backend
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ needs.prepare.outputs.backend_image }}:${{ github.sha }}
            ${{ needs.prepare.outputs.backend_image }}:latest

  update-helm-values:
    name: Update Helm Image Tags
    needs: [prepare, build-frontend, build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tags in values.yaml
        run: |
          SHA="${{ github.sha }}"
          IMAGE_NAMESPACE="${{ needs.prepare.outputs.image_namespace }}"
          sed -i "s|repository: .*play-hub-frontend|repository: ${REGISTRY}/${IMAGE_NAMESPACE}/play-hub-frontend|" helm/play-hub/values.yaml
          sed -i "s|repository: .*play-hub-backend|repository: ${REGISTRY}/${IMAGE_NAMESPACE}/play-hub-backend|" helm/play-hub/values.yaml
          sed -i "s|tag: .*# frontend-tag|tag: ${SHA} # frontend-tag|" helm/play-hub/values.yaml
          sed -i "s|tag: .*# backend-tag|tag: ${SHA} # backend-tag|" helm/play-hub/values.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/play-hub/values.yaml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
          git push
