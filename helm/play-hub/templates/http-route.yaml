{{/*
Gateway API HTTPRoute - 앱이 자기 라우팅을 소유한다.
플랫폼 Gateway(KKamJi98/helm-charts charts/envoy-gateway)의 wildcard
리스너에 붙는다. group/kind/weight 는 API server defaulting 과 일치시켜
ArgoCD diff 를 방지.
*/}}
{{- if .Values.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "play-hub.fullname" . }}
  labels:
    {{- include "play-hub.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.route.parentRef.name }}
      namespace: {{ .Values.route.parentRef.namespace }}
      sectionName: {{ .Values.route.parentRef.sectionName }}
  hostnames:
    - {{ .Values.route.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "play-hub.fullname" . }}-backend
          port: {{ .Values.backend.service.port }}
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /ws
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "play-hub.fullname" . }}-backend
          port: {{ .Values.backend.service.port }}
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "play-hub.fullname" . }}-frontend
          port: {{ .Values.frontend.service.port }}
          weight: 1
{{- end }}
