apiVersion: v1
kind: Service
metadata:
  name: {{ include "play-hub.fullname" . }}-backend
  labels:
    {{- include "play-hub.labels" . | nindent 4 }}
    {{- include "play-hub.backend.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "play-hub.backend.selectorLabels" . | nindent 4 }}
