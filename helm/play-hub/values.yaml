frontend:
  image:
    repository: ghcr.io/kkamji98/play-hub-frontend
    tag: 5a0c50de1aaac7cae95e04ed65c501047e4f98c3 # frontend-tag
    pullPolicy: IfNotPresent
  containerPort: 8080
  replicas: 1
  service:
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

backend:
  image:
    repository: ghcr.io/kkamji98/play-hub-backend
    tag: 5a0c50de1aaac7cae95e04ed65c501047e4f98c3 # backend-tag
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  host: play-hub.kkamji.net
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
  annotations:
    external-dns.alpha.kubernetes.io/target: "121.130.214.237"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
